<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="author" content="Alex Norton 2017 · modernized 2026" />
		<meta name="viewport" content="width=device-width">
		<title>gl_test · neuron 10010 — signal propagation</title>
		<style>
			html, body { padding: 0; margin: 0; overflow: hidden; background: #000; }
		</style>

		<!-- Import map: lets plain ES modules say `import ... from 'three'` while we
		     serve a locally-vendored three.js (no build step, no live CDN). -->
		<script type="importmap">
		{
			"imports": {
				"three": "/vendor/three/three.module.js",
				"three/addons/": "/vendor/three/addons/"
			}
		}
		</script>
	</head>

	<body>
		<div id="container"></div>
	</body>

		<!-- Shaders -->
	<script type="x-shader/x-vertex" id="vertexshader">

		// switch on high precision floats
		#ifdef GL_ES
		precision highp float;
		precision highp int;
		#endif

		// 16 signal frontiers (positions along the a_hops distance field).
		uniform float u_frontier[16];
		uniform float u_feather;   // half-width (in hops) of the lit band
		uniform vec3  u_camera_pos;

		attribute float a_hops;    // BFS hop distance from the soma (-1000 = disconnected)
		// Per-vertex membership in 16 backprop "channels", packed as 4 vec4s.
		// a_backprop1 holds channels 0–3, a_backprop2 → 4–7, etc. A component is
		// 1.0 when this vertex lies on that channel's traced-to-soma path.
		attribute vec4 a_backprop1;
		attribute vec4 a_backprop2;
		attribute vec4 a_backprop3;
		attribute vec4 a_backprop4;

		varying vec4 v_Color;
		varying vec3 v_From_Cam;
		varying vec3 v_Normal;

		float remap(float value, float inMin, float inMax, float outMin, float outMax) {
			return outMin + (outMax - outMin) * (value - inMin) / (inMax - inMin);
		}

		void main() {
			float amplitude = 0.0; // optional swell during a pulse (off by default)

			v_Normal    = normal;
			v_From_Cam  = u_camera_pos - position;

			// Distance from this vertex to the nearest *active* frontier, but only
			// for frontiers whose channel actually passes through this vertex. A big
			// penalty (1e6) is added when the vertex is off a given channel's path,
			// so off-path vertices never light up.
			//
			// FIX (modernization): the original loop ran `i <= 4`, which both read
			// only 5 of the 16 frontiers and indexed the vec4 attributes out of
			// bounds (component 4). The JS side clearly intends 16 channels mapped as
			// channel k → attribute floor(k/4), component k%4 — implemented here.
			float offset = 1000000.0;
			for (int c = 0; c < 4; c++) {
				offset = min(offset, abs(u_frontier[c]      - a_hops) + 1000000.0 * (1.0 - a_backprop1[c]));
				offset = min(offset, abs(u_frontier[4 + c]  - a_hops) + 1000000.0 * (1.0 - a_backprop2[c]));
				offset = min(offset, abs(u_frontier[8 + c]  - a_hops) + 1000000.0 * (1.0 - a_backprop3[c]));
				offset = min(offset, abs(u_frontier[12 + c] - a_hops) + 1000000.0 * (1.0 - a_backprop4[c]));
			}

			// Inside the feather band → fade red→blue based on distance from frontier.
			float r = 0.0;
			if (offset < u_feather) {
				r = remap(offset, 0.0, u_feather, 1.0, 0.0);
				// amplitude = r * 100.0; // uncomment for a swelling pulse
			}
			float b = 1.0 - r;
			v_Color = vec4(r, 0.0, b, 1.0);

			// Optional displacement of lit vertices along their normal.
			vec3 newPosition = position + normal * vec3(amplitude);

			gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
		}
	</script>

	<script type="x-shader/x-fragment" id="fragmentshader">

		#ifdef GL_ES
		precision highp float;
		#endif

		varying vec4 v_Color;
		varying vec3 v_From_Cam;
		varying vec3 v_Normal;

		void main() {
			// Simple multi-light shading: a camera-facing term plus two fixed lights,
			// blended into a grayscale factor that modulates the signal colour.
			vec3 from_Cam = normalize(v_From_Cam);
			vec3 light1 = normalize(vec3(1.0, 0.0, 0.0));
			vec3 light2 = normalize(vec3(0.0, 0.5, 0.0));

			float cam_mult    = 1.0;
			float light1_mult = 0.75;
			float light2_mult = 1.0;

			float dProdCam = max(0.0, dot(v_Normal, from_Cam));

			// Inverted dot → rim/edge-glow look.
			float dProd1 = max(0.0, dot(v_Normal, light1));
				  dProd1 = clamp(1.0 - dProd1, 0.0, 1.0);

			float dProd2 = max(0.0, dot(v_Normal, light2));

			float fragColorMix = clamp(
				(dProdCam * cam_mult + dProd1 * light1_mult + dProd2 * light2_mult) / 2.0,
				0.0, 1.0 );

			vec4 fragColor = vec4(fragColorMix, fragColorMix, fragColorMix, 1.0);

			gl_FragColor = (v_Color * fragColor);
		}
	</script>
	<!-- End Shaders -->

	<!-- OpenCTM decoder (framework-agnostic globals: LZMA, CTM). Loaded as classic
	     scripts so they run before the deferred module below; CTMLoader.js wraps them. -->
	<script src="../js/ctm/lzma.js"></script>
	<script src="../js/ctm/ctm.js"></script>

	<!-- Application entry point (ES module). -->
	<script type="module" src="../js/animationController_neuron.js"></script>
</html>
