<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="author" content="Alex Norton 2017 · modernized 2026" />
		<meta name="viewport" content="width=device-width">
		<title>gl_test · BFS frontier sweep</title>
		<style>
			html, body { padding: 0; margin: 0; overflow: hidden; background: #000; }
		</style>

		<!-- Import map: lets `import ... from 'three'` resolve to a locally-vendored
		     three.js — no build step, no live-CDN dependency. -->
		<script type="importmap">
		{
			"imports": {
				"three": "../vendor/three/three.module.js",
				"three/addons/": "../vendor/three/addons/"
			}
		}
		</script>
	</head>

	<body>
		<div id="container"></div>
	</body>

	<!--
		BFS frontier sweep — the self-contained demo of the technique the neuron
		visualization is built on, run on a torus-knot instead of a neuron mesh.

		Idea: do a breadth-first traversal of the mesh's vertex graph from a root
		vertex, recording each vertex's *discovery order* (0…N) into the a_threshold
		attribute. The shader then sweeps a moving `u_frontier` value across that
		0…N field and lights a feathered band around it, so a glowing ring appears
		to travel across the surface in BFS order. Press SPACE to reset the sweep.
	-->

		<!-- Shaders -->
	<script type="x-shader/x-vertex" id="vertexshader">

		#ifdef GL_ES
		precision highp float;
		precision highp int;
		#endif

		uniform float u_frontier;  // current sweep position (0 … u_length)
		uniform float u_length;    // total vertex count (the sweep wraps at this)
		uniform float u_feather;   // half-width of the lit band, in vertices
		uniform vec3  u_camera_pos;

		attribute float a_threshold; // this vertex's BFS discovery order (0 … N)

		varying vec4 v_Color;
		varying vec3 v_From_Cam;
		varying vec3 v_Normal;

		float remap(float value, float inMin, float inMax, float outMin, float outMax) {
			return outMin + (outMax - outMin) * (value - inMin) / (inMax - inMin);
		}

		// Shortest distance between a and b on a ring of circumference `length`,
		// so the sweep wraps seamlessly from N back to 0.
		float circle_dist(float a, float b, float length) {
			if (a > b) { float t = a; a = b; b = t; } // ensure a <= b
			return min((b - a), (a + length - b));
		}

		void main() {
			v_Normal   = normal;
			v_From_Cam = u_camera_pos - position;

			float offset = circle_dist(a_threshold, u_frontier, u_length);
			float r = 0.0;
			if (offset < u_feather) {
				r = remap(offset, 0.0, u_feather, 1.0, 0.0); // 1 at the frontier → 0 at band edge
			}
			float b = 1.0 - r;
			v_Color = vec4(r, 0.0, b, 1.0);

			gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
		}
	</script>

	<script type="x-shader/x-fragment" id="fragmentshader">

		#ifdef GL_ES
		precision highp float;
		#endif

		varying vec4 v_Color;
		varying vec3 v_From_Cam;
		varying vec3 v_Normal;

		void main() {
			vec3 from_Cam = normalize(v_From_Cam);
			vec3 light1 = normalize(vec3(1.0, 0.0, 0.0));
			vec3 light2 = normalize(vec3(0.0, 0.5, 0.0));

			float dProdCam = max(0.0, dot(v_Normal, from_Cam));
			float dProd1   = max(0.0, dot(v_Normal, light1));
			float dProd2   = max(0.0, dot(v_Normal, light2));

			float fragColorMix = clamp((dProdCam + dProd1 + dProd2) / 2.0, 0.0, 1.0);
			vec4 fragColor = vec4(fragColorMix, fragColorMix, fragColorMix, 1.0);

			gl_FragColor = (v_Color * fragColor);
		}
	</script>
	<!-- End Shaders -->

	<script type="module">

		import * as THREE from 'three';
		import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
		import Stats from 'three/addons/libs/stats.module.js';
		import { bft } from '../js/bft.js';

		const WIDTH  = window.innerWidth;
		const HEIGHT = window.innerHeight;

		const container = document.querySelector( '#container' );

		const renderer = new THREE.WebGLRenderer( { antialias: true } );
		renderer.setPixelRatio( window.devicePixelRatio );
		renderer.setSize( WIDTH, HEIGHT );
		container.appendChild( renderer.domElement );

		const camera = new THREE.PerspectiveCamera( 45, WIDTH / HEIGHT, 0.1, 1000 );
		camera.position.z = 80;

		const scene = new THREE.Scene();
		scene.add( camera );

		const stats = new Stats();
		stats.showPanel( 0 );
		document.body.appendChild( stats.dom );

		const controls = new TrackballControls( camera, renderer.domElement );

		window.addEventListener( 'resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize( window.innerWidth, window.innerHeight );
			controls.handleResize();
		} );

		// ---- Mesh + BFS ----------------------------------------------------------
		// MODERNIZE: TorusKnotBufferGeometry → TorusKnotGeometry (the "Buffer" alias
		// was removed; all geometry is BufferGeometry now).
		const geo = new THREE.TorusKnotGeometry( 15, 5, 1000, 64 );

		const vertices = geo.getAttribute( 'position' ).array;
		const vertex_count = vertices.length / 3;
		const faces = geo.index.array;

		// Build vertex adjacency (index → neighbour indices) from the triangles.
		const adjacency_map = new Map();
		for ( const v of faces ) adjacency_map.set( v, adjacency_map.get( v ) || [] );
		for ( let i = 0; i < faces.length; i += 3 ) {
			const [ v1, v2, v3 ] = [ faces[ i ], faces[ i + 1 ], faces[ i + 2 ] ];
			adjacency_map.get( v1 ).push( v2, v3 );
			adjacency_map.get( v2 ).push( v1, v3 );
			adjacency_map.get( v3 ).push( v2, v1 );
		}

		// Discovery-order BFS from vertex 0. (bft() returns hop *distance*; here we
		// want a unique, monotonically increasing value per vertex for a smooth
		// sweep, so we run a small BFS that records visitation order instead.)
		const a_threshold = new Float32Array( vertex_count );
		{
			const visited = new Uint8Array( vertex_count );
			let order = 0;
			let frontier = [ 0 ];
			visited[ 0 ] = 1;
			while ( frontier.length ) {
				const next = [];
				for ( const node of frontier ) {
					a_threshold[ node ] = order ++;
					for ( const nb of adjacency_map.get( node ) ) {
						if ( ! visited[ nb ] ) { visited[ nb ] = 1; next.push( nb ); }
					}
				}
				frontier = next;
			}
		}

		geo.setAttribute( 'a_threshold', new THREE.BufferAttribute( a_threshold, 1 ) );

		// ---- Material ------------------------------------------------------------
		const uniforms = {
			u_frontier:   { value: 0.0 },
			u_length:     { value: vertex_count },
			u_feather:    { value: Math.floor( vertex_count * 0.25 ) },
			u_camera_pos: { value: new THREE.Vector3() },
		};

		const material = new THREE.ShaderMaterial( {
			uniforms,
			vertexShader:   document.getElementById( 'vertexshader' ).textContent,
			fragmentShader: document.getElementById( 'fragmentshader' ).textContent,
		} );

		const mesh = new THREE.Mesh( geo, material );
		scene.add( mesh );

		// ---- Animation -----------------------------------------------------------
		// Sweep the frontier across the whole 0…N range over `frames` frames.
		const frames = 300;
		const step = Math.floor( vertex_count / frames );
		let frontier = 0;
		let rotate = 0;

		window.addEventListener( 'keydown', ( e ) => {
			if ( e.code === 'Space' ) { e.preventDefault(); frontier = 0; } // reset sweep
		} );

		renderer.setAnimationLoop( () => {
			stats.begin();

			rotate += 0.005;
			mesh.rotation.set( rotate, rotate, rotate );

			frontier = ( frontier + step ) % vertex_count;
			uniforms.u_frontier.value = frontier;
			uniforms.u_camera_pos.value.copy( camera.position );

			controls.update();
			renderer.render( scene, camera );

			stats.end();
		} );

	</script>
</html>
