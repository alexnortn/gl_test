	<!-- ===================== Shaders ===================== -->

	<!-- SAC: an outward "shell" wave expanding from the soma along a_hops.
	     A single increasing frontier lights every branch at a given radius at once,
	     so the wave bifurcates naturally and dies out past the dendrite tips. -->
	<script type="x-shader/x-vertex" id="sac-vertex">
		#ifdef GL_ES
		precision highp float;
		#endif

		uniform float u_frontier[8];   // up to 8 concurrent outward waves
		uniform float u_feather;
		uniform vec3  u_camera_pos;

		attribute float a_hops;        // hop distance from the SAC soma

		varying float v_signal;
		varying vec3  v_Normal;
		varying vec3  v_From_Cam;

		float remap(float v, float a, float b, float c, float d) {
			return c + (d - c) * (v - a) / (b - a);
		}

		void main() {
			v_Normal   = normal;
			v_From_Cam = u_camera_pos - position;

			// Parked waves sit at -100000, so |frontier - a_hops| is huge → no light.
			float offset = 1000000.0;
			for (int i = 0; i < 8; i++) {
				offset = min(offset, abs(u_frontier[i] - a_hops));
			}

			float r = 0.0;
			if (offset < u_feather) r = remap(offset, 0.0, u_feather, 1.0, 0.0);
			v_signal = r;

			gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
		}
	</script>

	<!-- Ganglion: an inward band travelling along a traced path toward the soma.
	     16 channels packed into 4 vec4 path-membership attributes (as in neuron/). -->
	<script type="x-shader/x-vertex" id="gan-vertex">
		#ifdef GL_ES
		precision highp float;
		#endif

		uniform float u_frontier[16];  // 16 concurrent inward pulses
		uniform float u_feather;
		uniform vec3  u_camera_pos;

		attribute float a_hops;        // hop distance from the ganglion soma
		attribute vec4  a_backprop1;
		attribute vec4  a_backprop2;
		attribute vec4  a_backprop3;
		attribute vec4  a_backprop4;

		varying float v_signal;
		varying vec3  v_Normal;
		varying vec3  v_From_Cam;

		float remap(float v, float a, float b, float c, float d) {
			return c + (d - c) * (v - a) / (b - a);
		}

		void main() {
			v_Normal   = normal;
			v_From_Cam = u_camera_pos - position;

			// channel k → attribute floor(k/4), component k%4. A vertex only responds
			// to a pulse whose path passes through it (membership flag == 1).
			float offset = 1000000.0;
			for (int c = 0; c < 4; c++) {
				offset = min(offset, abs(u_frontier[c]      - a_hops) + 1000000.0 * (1.0 - a_backprop1[c]));
				offset = min(offset, abs(u_frontier[4 + c]  - a_hops) + 1000000.0 * (1.0 - a_backprop2[c]));
				offset = min(offset, abs(u_frontier[8 + c]  - a_hops) + 1000000.0 * (1.0 - a_backprop3[c]));
				offset = min(offset, abs(u_frontier[12 + c] - a_hops) + 1000000.0 * (1.0 - a_backprop4[c]));
			}

			float r = 0.0;
			if (offset < u_feather) r = remap(offset, 0.0, u_feather, 1.0, 0.0);
			v_signal = r;

			gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
		}
	</script>

	<!-- Shared fragment: Fresnel rim shading. Surfaces whose normal is perpendicular
	     to the view (silhouette edges) glow in the cell's colour, while faces pointing
	     at the camera stay dim — this makes each cell's dendrites "pop" at the edges
	     and read apart from the other cell. Neural impulses override toward the bright
	     signal colour. -->
	<script type="x-shader/x-fragment" id="frag">
		#ifdef GL_ES
		precision highp float;
		#endif

		uniform vec3 u_baseColor;
		uniform vec3 u_signalColor;

		varying float v_signal;
		varying vec3  v_Normal;
		varying vec3  v_From_Cam;

		void main() {
			vec3 N = normalize(v_Normal);
			vec3 V = normalize(v_From_Cam);

			// Fresnel: ~0 facing the camera, →1 at grazing/silhouette angles.
			float ndotv   = max(0.0, dot(N, V));
			float fresnel = pow(1.0 - ndotv, 2.2);

			// Brighter interior fill + a softer rim that still glows at the edges
			// (raised the base, eased the rim multiplier so the cores aren't dim).
			float intensity = 0.60 + 0.85 * fresnel;
			vec3 body    = u_baseColor * intensity;
			vec3 impulse = u_signalColor * (0.80 + 0.6 * fresnel); // stays bright

			vec3 col = mix(body, impulse, v_signal);
			gl_FragColor = vec4(col, 1.0);
		}
	</script>
